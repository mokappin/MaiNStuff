
  <svg viewBox="0 0 800 90" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <style>
      .marquee {
        animation: scroll 11s linear infinite;
      }
      @keyframes scroll {
        0% {
          transform: translateX(100%);
        }
        100% {
          transform: translateX(-300%);
        }
      }
    </style>
    <defs>
      <path id="marqueePath" d="M 0,50 H 1600" />
    </defs>
    <g class="marquee">
  
      <g transform="scale(1.5)">
        <image xlink:href="data:image/gif;base64," width="230" height="70" x="0" y="0" />
      </g>
    
      <g transform="scale(1.5)">
        <image xlink:href="data:image/gif;base64," width="230" height="70" x="250" y="0" />
      </g>
    
      <g transform="scale(1.5)">
        <image xlink:href="data:image/gif;base64," width="230" height="70" x="500" y="0" />
      </g>
    
      <g transform="scale(1.5)">
        <image xlink:href="data:image/webp;base64," width="230" height="70" x="750" y="0" />
      </g>
    
      <g transform="scale(1.5)">
        <image xlink:href="data:image/webp;base64," width="230" height="70" x="1000" y="0" />
      </g>
    
      <g transform="scale(1.5)">
        <image xlink:href="data:image/webp;base64," width="230" height="70" x="1250" y="0" />
      </g>
    
    </g>
  </svg>
